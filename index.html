<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mahi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #1d2b64, #f8cdda);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    max-width: 500px;
}

h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    line-height: 1.6;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.yes {
    background: white;
    color: #ff4d6d;
}

.no {
    background: transparent;
    border: 1px solid white;
    color: white;
}

button:hover {
    transform: scale(1.1);
}

</style>
</head>

<body>

<div class="card">
    <h1 id="title"></h1>
    <p id="message"></p>

    <button class="yes" onclick="yes()">Yes, let's talk ❤️</button>
    <button class="no" onclick="no()">Maybe later</button>
</div>

<script>

let text1 = "Mahi...";
let text2 = "Pata nahi kaise shuru karu, par ek baat dil se kehni hai.\n\n1 saal ho gaya hai... par tumhari jagah aaj bhi wahi hai.\n\nMain perfect nahi tha, galtiyan hui... par tum mere liye kabhi normal nahi thi.\n\nAgar tum chaho... to kya hum fir se baat shuru kar sakte hain? ❤️";

let i = 0;
let j = 0;

function typeTitle() {
    if(i < text1.length){
        document.getElementById("title").innerHTML += text1.charAt(i);
        i++;
        setTimeout(typeTitle, 100);
    } else {
        typeMessage();
    }
}

function typeMessage() {
    if(j < text2.length){
        document.getElementById("message").innerHTML += text2.charAt(j);
        j++;
        setTimeout(typeMessage, 30);
    }
}

typeTitle();

function yes(){
    document.body.innerHTML = `
    <div style="text-align:center;">
        <h1>Thank You Mahi ❤️</h1>
        <p>Main tumhe kabhi hurt nahi karunga 😊</p>
        <p> kahin ghumne bhi leke  chalunga tumko  🚗</p>
        <p>GolGappe bhi khilaunga pakka 😋</p>
    </div>
    `;
}

function no(){
    document.body.innerHTML = `
    <div style="text-align:center;">
        <h1>Mujhe sirf tum hi chahiye ❤️</h1>
        <p>Chahe kitna bhi time lage… main wait karunga 🥺</p>
        <p>Tumhari jagah koi aur nahi le sakta 💔</p>
    </div>
    `;
}


    


</script>

</body>
</html>
